<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillGrid - Create Premium Account</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d1117; color: #ffffff; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .register-container { width: 90%; max-width: 450px; background: #161b22; padding: 40px; border-radius: 12px; border: 1px solid rgba(67, 233, 123, 0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .logo-text { font-size: 2.5rem; font-weight: 800; text-align: center; margin-bottom: 25px; background: linear-gradient(45deg, #00f2fe, #43e97b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; color: #8b949e; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #fff; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #43e97b; }
        .btn-register { width: 100%; padding: 14px; background: linear-gradient(90deg, #43e97b, #38f9d7); border: none; border-radius: 6px; color: #0d1117; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(67, 233, 123, 0.4); }
        .footer-text { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #8b949e; }
        .footer-text a { color: #00f2fe; text-decoration: none; }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="logo-text">SkillGrid</div>
        <h3 style="text-align: center; margin-bottom: 20px; color: #8b949e;">Premium Registration</h3>
        
        <!-- Pempho limatumizidwa ku server backend yathu -->
        <form action="/api/register" method="POST">
            <div class="form-group">
                <label for="username">Choose Username</label>
                <input type="text" id="username" name="username" required placeholder="e.g. wizard_phillimon">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label for="category">Select Core Package (K1,999/Mo)</label>
                <select id="category" name="category" required>
                    <option value="hacking">Ethical Hacking Lab</option>
                    <option value="school">Malawian Education Hub (MSCE/JC)</option>
                    <option value="repair">Phone & PC Repair Academy</option>
                </select>
            </div>
            <button type="submit" class="btn-register">Proceed to Payment (PayChangu)</button>
        </form>
        
        <div class="footer-text">
            Already registered? <a href="/login">Login here</a>
        </div>
    </div>

</body>
</html>
